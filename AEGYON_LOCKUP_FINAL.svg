<svg viewBox="0 0 500 650" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="constraint-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1f3a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2a2f42;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Wide left funnel line (curved, heavier) -->
  <path d="M 60 120 Q 200 240 250 350" stroke="url(#constraint-gradient)" stroke-width="14" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Wide right funnel line (curved, heavier) -->
  <path d="M 440 120 Q 300 240 250 350" stroke="url(#constraint-gradient)" stroke-width="14" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Central clarity line (tall, bold) -->
  <line x1="250" y1="350" x2="250" y2="100" stroke="url(#constraint-gradient)" stroke-width="16" stroke-linecap="round"/>

  <!-- Constraint point - large, prominent -->
  <circle cx="250" cy="350" r="18" fill="#00CFDE"/>
  <circle cx="250" cy="350" r="12" fill="#1a1f3a"/>

  <!-- Heavy stability base -->
  <line x1="100" y1="410" x2="400" y2="410" stroke="#1a1f3a" stroke-width="8" stroke-linecap="round" opacity="0.8"/>

  <!-- Teal accent underline (more prominent) -->
  <line x1="110" y1="435" x2="390" y2="435" stroke="#00CFDE" stroke-width="6" stroke-linecap="round" opacity="1"/>

  <!-- "AEGYON" - BOLD, LARGE, CENTERED -->
  <text x="250" y="530" style="font-family: Arial, Helvetica, sans-serif; font-size: 72px; font-weight: 900; fill: #1a1f3a; text-anchor: middle; letter-spacing: -2px;">AEGYON</text>

  <!-- "Structural Clarity" tagline -->
  <text x="250" y="575" style="font-family: Arial, Helvetica, sans-serif; font-size: 16px; font-weight: 600; fill: #00CFDE; text-anchor: middle; letter-spacing: 3px;">STRUCTURAL CLARITY</text>

</svg>